<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 畢業餐會 - 中華大學</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;700;900&display=swap');
        
        body { 
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #FDFCFB;
            color: #1C1917;
            margin: 0;
        }
        
        .font-serif-tc { font-family: 'Noto Serif TC', serif; }
        
        .luxury-card {
            background: #ffffff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.03);
            border: 1px solid rgba(212, 175, 55, 0.15);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .luxury-card:hover {
            transform: translateY(-8px);
            border-color: #D4AF37;
            box-shadow: 0 30px 60px rgba(180, 140, 40, 0.1);
        }

        .line-accent {
            height: 1px;
            background: linear-gradient(to right, transparent, #D4AF37, transparent);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade {
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .paper-bg {
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
        }
    </style>
</head>
<body class="paper-bg">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('home'); 
            const [selectedGroup, setSelectedGroup] = useState(null);
            const [publicUrl, setPublicUrl] = useState('');

            // DỮ LIỆU ĐÃ CHIA 3 NHÓM THEO YÊU CẦU CỦA CẬU
            const groups = [
                { 
                    id: 1, 
                    name: '餐旅管理學系', 
                    sub: '餐旅甲班 & 進修學士班 (21人)', 
                    students: [
                        { id: "B11118001", name: "簡國軒" }, { id: "B11118003", name: "劉曜樟" },
                        { id: "B11118005", name: "楊以琳" }, { id: "B11118008", name: "陳珈妤" },
                        { id: "B11118009", name: "蕭富池" }, { id: "B11118011", name: "黃沛婕" },
                        { id: "B11118013", name: "沈俊憲" }, { id: "B11118014", name: "呂芸萱" },
                        { id: "B11118015", name: "徐聿呈" }, { id: "B11118016", name: "陳衍廷" },
                        { id: "B11118017", name: "鄭安凱" }, { id: "B11118018", name: "王凱勳" },
                        { id: "B11118019", name: "黃子真" }, { id: "B11118022", name: "陳靜雯" },
                        { id: "B11118024", name: "黃靖哲" }, { id: "B11118025", name: "王詩妮" },
                        { id: "B11118026", name: "鄭茹安" }, { id: "B11118027", name: "陳柏瑋" },
                        { id: "B11118037", name: "潘雯蕙" }, { id: "H11118011", name: "黃阡喻" },
                        { id: "H11172032", name: "曾威翔" }
                    ]
                },
                { 
                    id: 2, 
                    name: '會展與活動管理組', 
                    sub: '會展甲班 (12人)', 
                    students: [
                        { id: "B11172001", name: "王梓傑" }, { id: "B11172002", name: "陳美宜" },
                        { id: "B11172003", name: "陳冠宏" }, { id: "B11172004", name: "陳姿羽" },
                        { id: "B11172005", name: "林姿妤" }, { id: "B11172006", name: "張庭瑀" },
                        { id: "B11172008", name: "林宜靜" }, { id: "B11172010", name: "施宇婕" },
                        { id: "B11172011", name: "蕭郁潔" }, { id: "B11172012", name: "謝孟璇" },
                        { id: "B11172013", name: "陳姿諭" }, { id: "B11172015", name: "郭庭妤" }
                    ]
                },
                { 
                    id: 3, 
                    name: '旅遊與休閒管理組', 
                    sub: '旅遊乙班 (8人)', 
                    students: [
                        { id: "B11172023", name: "邱于庭" }, { id: "B11172025", name: "戴君竹" },
                        { id: "B11172026", name: "黃子瑜" }, { id: "B11172028", name: "曾柔雅" },
                        { id: "B11172029", name: "游雅竹" }, { id: "B11172030", name: "廖振傑" },
                        { id: "B11172031", name: "謝長峻" }, { id: "B11172032", name: "高郁涵" }
                    ]
                }
            ];

            useEffect(() => {
                const currentUrl = window.location.origin + window.location.pathname;
                setPublicUrl(currentUrl);

                const params = new URLSearchParams(window.location.search);
                const gid = params.get('group');
                if (gid) {
                    const found = groups.find(g => g.id === parseInt(gid));
                    if (found) { setSelectedGroup(found); setView('list'); }
                }
            }, []);

            const getQRUrl = (gid) => {
                const finalLink = `${publicUrl}?group=${gid}`;
                return `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(finalLink)}&margin=10&color=000000`;
            };

            const HomeView = () => (
                <div className="min-h-screen py-20 px-6 flex flex-col items-center">
                    <div className="text-center mb-20 animate-fade">
                        <p className="text-amber-600 font-bold tracking-[0.6em] text-[10px] mb-4 uppercase">Chung Hua University</p>
                        <h1 className="text-5xl font-serif-tc font-black text-stone-800 mb-4 tracking-tighter">畢業生智能名單系統</h1>
                        <div className="line-accent w-24 mx-auto mb-8"></div>
                        <p className="text-stone-400 font-medium tracking-widest text-xs">請掃描以下 QR Code 獲取各組名單</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-10 max-w-7xl w-full">
                        {groups.map((group, idx) => (
                            <div key={group.id} style={{ animationDelay: `${idx * 0.1}s` }} className="luxury-card p-12 rounded-sm flex flex-col items-center text-center animate-fade opacity-0 fill-mode-forwards relative overflow-hidden group">
                                <div className="absolute top-0 left-0 w-full h-1 bg-amber-500 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                
                                <h3 className="text-2xl font-serif-tc font-black text-stone-800 mb-2 leading-tight">{group.name}</h3>
                                <p className="text-amber-600 text-[10px] font-bold tracking-widest mb-10 uppercase">{group.sub}</p>
                                
                                <div className="bg-white p-4 border border-stone-50 shadow-inner group-hover:scale-105 transition-transform duration-700 mb-10">
                                    <img src={getQRUrl(group.id)} className="w-56 h-56" alt="QR" />
                                </div>

                                <button 
                                    onClick={() => { setSelectedGroup(group); setView('list'); }}
                                    className="w-full bg-stone-900 text-white py-4 text-[10px] font-black tracking-[0.4em] hover:bg-amber-600 transition-all uppercase"
                                >
                                    點擊預覽名單
                                </button>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const ListView = () => (
                <div className="min-h-screen bg-white animate-fade">
                    <header className="bg-stone-900 py-24 px-6 text-center text-white relative">
                        <button onClick={() => setView('home')} className="absolute top-10 left-10 text-amber-500 text-[10px] font-black tracking-widest uppercase flex items-center gap-2 hover:text-white transition-colors">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                            返回首頁
                        </button>
                        <h2 className="text-4xl font-serif-tc font-black mb-4 tracking-tight leading-tight">{selectedGroup.name}</h2>
                        <p className="text-amber-500 text-[10px] font-bold tracking-[0.4em] uppercase">{selectedGroup.sub}</p>
                    </header>

                    <main className="max-w-4xl mx-auto px-8 py-20">
                        {/* LỜI CHÚC CHUNG BẰNG TIẾNG TRUNG */}
                        <div className="text-center mb-24 p-12 border border-stone-100 rounded-sm bg-stone-50 shadow-sm relative overflow-hidden">
                            <span className="absolute -top-4 left-1/2 -translate-x-1/2 bg-white px-4 text-amber-500/20 text-5xl font-serif-tc italic">“</span>
                            <h3 className="text-3xl font-serif-tc font-black text-stone-800 leading-relaxed mb-6">
                                祝全體畢業生：<br/>畢業快樂，前程似錦！<br/>願未來的每一天都閃耀如金。
                            </h3>
                            <div className="line-accent w-32 mx-auto opacity-50"></div>
                        </div>

                        {/* TIÊU ĐỀ DANH SÁCH */}
                        <div className="grid grid-cols-2 border-b-2 border-stone-900 pb-6 mb-8 px-4">
                            <div className="text-[11px] font-black tracking-[0.4em] text-stone-400 uppercase italic">學號 / Student ID</div>
                            <div className="text-[11px] font-black tracking-[0.4em] text-stone-400 uppercase italic text-right">姓名 / Name</div>
                        </div>

                        {/* DANH SÁCH SINH VIÊN */}
                        <div className="space-y-0 divide-y divide-stone-50">
                            {selectedGroup.students.map((student, idx) => (
                                <div key={student.id} style={{ animationDelay: `${idx * 0.05}s` }} className="grid grid-cols-2 py-7 animate-fade opacity-0 fill-mode-forwards hover:bg-stone-50 transition-colors px-4">
                                    <div className="text-stone-400 font-mono text-sm tracking-widest flex items-center">{student.id}</div>
                                    <div className="text-2xl font-serif-tc font-black text-stone-800 flex items-center justify-end">{student.name}</div>
                                </div>
                            ))}
                        </div>
                    </main>

                    <footer className="py-24 border-t border-stone-50 text-center opacity-40">
                        <p className="text-[9px] font-bold tracking-[0.6em] text-stone-400 uppercase italic">Chung Hua University • Taiwan • 2026</p>
                    </footer>
                </div>
            );

            return view === 'home' ? <HomeView /> : <ListView />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
